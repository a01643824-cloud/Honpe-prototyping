<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honpe ProtoSphere</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="navbar">
  <div class="nav-container">
    <div class="brand">HONPE ProtoSphere</div>

    <button id="menuToggle">☰</button>

    <nav id="navMenu">
      <ul class="nav-links">
        <!-- 🔥 CAMBIO 1: chatbot primero -->
        <li><a href="#chatbot">Asistente</a></li>
        <li><a href="#cotizacion">Cotización</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>HONPE</h1>
  <h2>ProtoSphere</h2>
</section>

<!-- 🔥 CAMBIO 1: CHATBOT PRIMERO -->
<section id="chatbot">
  <h2>Asistente virtual</h2>

  <input type="text" id="chat" placeholder="Escribe tu duda...">
  <button onclick="responder()">Enviar</button>

  <p id="respuesta"></p>
</section>

<!-- 🔥 CAMBIO 1: DESPUÉS VA COTIZACIÓN -->
<section id="cotizacion">
  <h2>Cotización</h2>

  <form id="cotizacionForm">
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="correo" placeholder="Correo electrónico" required>

    <button type="submit">Enviar solicitud</button>

    <!-- 🔥 CAMBIO 2: mensaje aparece aquí -->
    <p id="mensajeForm"></p>
  </form>
</section>

<!-- 🔥 CAMBIO 3: IMAGEN 3D -->
<section id="modelo3d">
  <h2>Visualización 3D</h2>

  <div class="image-3d-view">
    <img src="assets/modelo-3d.jpg" class="modelo-3d-img">
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
